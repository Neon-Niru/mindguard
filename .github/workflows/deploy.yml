name: Deploy Frontend

on:
  push:
    branches:
      - backup-f71dc85

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: mindguard-frontend
        run: npm install

      - name: Build
        working-directory: mindguard-frontend
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: mindguard-frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
